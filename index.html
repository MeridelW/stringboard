<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Stringboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #f9f9fb;
    --panel: #ffffff;
    --border: #e0e0e6;
    --text: #1c1b22;
    --text-muted: #5b5b66;
    --accent: #0060df;
    --stale: #c50042;
    --fresh: #2e7d32;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  header h1 { margin: 0 0 4px; font-size: 20px; }
  header p { margin: 0; color: var(--text-muted); font-size: 13px; }

  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    padding: 16px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
  }
  .controls input[type="search"] {
    flex: 1;
    min-width: 200px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
  }
  .controls select, .controls label {
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    background: white;
  }
  .controls label { display: flex; align-items: center; gap: 6px; cursor: pointer; }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left;
    padding: 10px 24px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .03em;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: var(--accent); }
  tbody tr.row { cursor: pointer; border-bottom: 1px solid var(--border); }
  tbody tr.row:hover { background: #f0f4ff; }
  tbody td { padding: 10px 24px; font-size: 14px; vertical-align: top; }
  td.id { font-family: ui-monospace, monospace; font-size: 13px; }
  td.value { color: var(--text-muted); max-width: 360px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge.stale { background: #fde7ec; color: var(--stale); }
  .badge.fresh { background: #e6f4ea; color: var(--fresh); }
  .badge.checked { background: #e6f4ea; color: var(--fresh); }
  .badge.unchecked { background: #f0f0f3; color: var(--text-muted); }

  tr.detail-row td {
    background: #fbfbfd;
    padding: 16px 24px 24px;
    border-bottom: 1px solid var(--border);
  }
  .detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 16px;
  }
  .detail-grid div span.label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 2px;
  }
  .detail-grid div span.val { font-size: 14px; }
  a.source-link {
    color: var(--accent);
    text-decoration: none;
    font-size: 13px;
  }
  a.source-link:hover { text-decoration: underline; }

  .propose-box {
    margin-top: 16px;
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: white;
  }
  .propose-box h4 { margin: 0 0 8px; font-size: 13px; text-transform: uppercase; color: var(--text-muted); }
  .propose-box textarea {
    width: 100%;
    min-height: 60px;
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: inherit;
    font-size: 14px;
    resize: vertical;
  }
  .propose-box .actions { margin-top: 8px; display: flex; gap: 8px; align-items: center; }
  .propose-box button {
    padding: 8px 14px;
    border: none;
    border-radius: 6px;
    background: var(--accent);
    color: white;
    font-size: 13px;
    cursor: pointer;
  }
  .propose-box button:disabled { background: #c5c5cc; cursor: not-allowed; }
  .propose-box .note { font-size: 12px; color: var(--text-muted); }

  .voice-toggle { display: flex; align-items: center; gap: 6px; font-size: 13px; margin-top: 4px; }

  #count { padding: 8px 24px; font-size: 12px; color: var(--text-muted); }

  td.fieldLabel { font-size: 13px; }
  td.fieldLabel.inferred { color: var(--text-muted); font-style: italic; }
  .variant-note { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; color: #a85a1f; margin-bottom: 6px; }
  .variant-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .variant-key {
    flex: 0 0 auto; font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .03em; color: #a85a1f; background: #fdf1e6; border-radius: 4px;
    padding: 1px 6px; white-space: nowrap;
  }
</style>
</head>
<body>

<header>
  <h1>Stringboard</h1>
  <p>Live UI strings pulled from <a href="https://github.com/mozilla-firefox/firefox" target="_blank" rel="noopener">mozilla-firefox/firefox</a>. Refreshed nightly.</p>
</header>

<div class="controls">
  <input type="search" id="search" placeholder="Search by id, value, or file…">
  <select id="platformFilter">
    <option value="">All platforms</option>
    <option value="desktop">Desktop</option>
    <option value="android">Android</option>
    <option value="ios">iOS</option>
  </select>
  <select id="fileFilter"><option value="">All files</option></select>
  <select id="staleFilter">
    <option value="">All strings</option>
    <option value="true">Stale only</option>
    <option value="false">Fresh only</option>
  </select>
  <label><input type="checkbox" id="voiceFilter"> Needs voice check</label>
  <label title="Screen-reader labels/descriptions (aria-label, aria-description) aren't shown on screen - read aloud by assistive tech only. Off by default.">
    <input type="checkbox" id="ariaFilter"> Show screen-reader-only labels
  </label>
</div>
<div id="count"></div>

<table>
  <thead>
    <tr>
      <th data-sort="platform">Platform</th>
      <th data-sort="id">ID</th>
      <th data-sort="file">File</th>
      <th data-sort="fieldLabel">Content type</th>
      <th data-sort="text">Text</th>
      <th data-sort="lastUpdated">Last updated</th>
      <th data-sort="lastAuthor">Author</th>
      <th data-sort="stale">Status</th>
      <th data-sort="voiceChecked">Voice checked</th>
    </tr>
  </thead>
  <tbody id="rows"></tbody>
</table>

<script>
let DATA = [];
let sortKey = "file";
let sortAsc = true;
let openId = null;

function fmtDate(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
}

// A message can now produce several rows (its value + each attribute), so
// the key needs the field too, not just file+id.
function rowKey(r) { return r.file + "::" + r.id + "::" + r.field; }

// All of a row's variant wordings joined into one searchable/sortable
// string (e.g. "Mozilla Firefox — Private Browsing / Mozilla Firefox
// Private Browsing" for an OS-varying string).
function variantText(r) {
  return (r.variants || []).map(v => v.text).join(" / ");
}

function matchesFilters(r) {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const fileFilter = document.getElementById("fileFilter").value;
  const staleFilter = document.getElementById("staleFilter").value;
  const voiceFilter = document.getElementById("voiceFilter").checked;
  const ariaFilter = document.getElementById("ariaFilter").checked;

  const platformFilter = document.getElementById("platformFilter").value;
  if (platformFilter && r.platform !== platformFilter) return false;
  if (fileFilter && r.file !== fileFilter) return false;
  if (staleFilter && String(!!r.stale) !== staleFilter) return false;
  if (voiceFilter && r.voiceChecked) return false;
  // Screen-reader-only labels are real content but a different category
  // (never shown as their own visible text) - hidden unless asked for.
  if (r.screenReaderOnly && !ariaFilter) return false;
  if (q) {
    const hay = (r.id + " " + r.id.replace(/[-.]/g, " ") + " " + variantText(r) + " " + r.file + " " + (r.fieldLabel || "") + " " + (r.section || "")).toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortRows(rows) {
  return rows.slice().sort((a, b) => {
    let av = sortKey === "text" ? variantText(a) : a[sortKey];
    let bv = sortKey === "text" ? variantText(b) : b[sortKey];
    if (av === null || av === undefined) av = "";
    if (bv === null || bv === undefined) bv = "";
    if (av < bv) return sortAsc ? -1 : 1;
    if (av > bv) return sortAsc ? 1 : -1;
    return 0;
  });
}

// One-line preview for the table row. Multi-variant strings (OS-specific or
// plural wording) show every variant joined with " / " here; the full
// stacked, labeled breakdown is in the detail row below.
function valuePreview(r) {
  const text = variantText(r);
  return text || "—";
}

function render() {
  const tbody = document.getElementById("rows");
  tbody.innerHTML = "";
  const filtered = sortRows(DATA.filter(matchesFilters));
  document.getElementById("count").textContent = `${filtered.length} of ${DATA.length} strings`;

  for (const r of filtered) {
    const key = rowKey(r);
    const tr = document.createElement("tr");
    tr.className = "row";
    tr.innerHTML = `
      <td>${r.platform}</td>
      <td class="id">${r.id}</td>
      <td>${r.file.split("/").pop()}</td>
      <td class="fieldLabel${r.fieldLabelInferred ? " inferred" : ""}" title="${r.fieldLabelInferred ? "Guessed from the string's name, not ground truth" : ""}">${escapeHtml(r.fieldLabel || "—")}</td>
      <td class="value">${escapeHtml(valuePreview(r))}</td>
      <td>${fmtDate(r.lastUpdated)}</td>
      <td>${r.lastAuthor || "—"}</td>
      <td>${r.stale === null ? "—" : `<span class="badge ${r.stale ? "stale" : "fresh"}">${r.stale ? "Stale" : "Fresh"}</span>`}</td>
      <td><span class="badge ${r.voiceChecked ? "checked" : "unchecked"}">${r.voiceChecked ? "Checked" : "Not checked"}</span></td>
    `;
    tr.addEventListener("click", () => toggleDetail(key));
    tbody.appendChild(tr);

    if (openId === key) {
      tbody.appendChild(renderDetail(r));
    }
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function renderDetail(r) {
  const tr = document.createElement("tr");
  tr.className = "detail-row";
  const td = document.createElement("td");
  td.colSpan = 9;
  const variants = r.variants || [];
  const variantsHtml = variants.length > 1
    ? `<div class="variant-note">${escapeHtml(r.variantNote || "Wording varies")}</div>` +
      variants.map(v => `<div class="variant-row"><span class="variant-key">${escapeHtml(v.key || "")}</span><span>${escapeHtml(v.text)}</span></div>`).join("")
    : `<div>${escapeHtml(variants[0]?.text || "(empty)")}</div>`;
  td.innerHTML = `
    <div class="detail-grid">
      <div><span class="label">Platform</span><span class="val">${r.platform}</span></div>
      <div><span class="label">Content type</span><span class="val">${escapeHtml(r.fieldLabel || "—")}${r.fieldLabelInferred ? " (guessed from name)" : ""}</span></div>
      <div><span class="label">Section</span><span class="val">${escapeHtml(r.section || "—")}</span></div>
      <div><span class="label">File</span><span class="val">${r.file}</span></div>
      <div><span class="label">Line</span><span class="val">${r.line}</span></div>
      <div><span class="label">Trigger</span><span class="val">${r.trigger || "TODO"}</span></div>
      <div><span class="label">Visibility</span><span class="val">${r.visibility || "TODO"}</span></div>
      <div><span class="label">View source</span><span class="val"><a class="source-link" target="_blank" rel="noopener" href="${r.sourceUrl}">${r.sourceUrl.split("/").pop()} ↗</a></span></div>
    </div>
    <div><strong>Text:</strong>${variantsHtml}</div>
    ${r.note ? `<div style="margin-top:6px;"><strong>Translator note:</strong> ${escapeHtml(r.note)}</div>` : ""}
    <label class="voice-toggle">
      <input type="checkbox" ${r.voiceChecked ? "checked" : ""} data-voice-toggle>
      Mark as voice-checked
    </label>
    <div class="propose-box">
      <h4>Propose an edit</h4>
      <textarea placeholder="Suggested new copy…">${escapeHtml(variants[0]?.text || "")}</textarea>
      <div class="actions">
        <button data-propose disabled title="Opening real PRs is a future step">Propose as pull request</button>
        <span class="note">Coming soon — will open a PR against mozilla-firefox/firefox.</span>
      </div>
    </div>
  `;
  td.querySelector("[data-voice-toggle]").addEventListener("change", (e) => {
    r.voiceChecked = e.target.checked;
    render();
  });
  tr.appendChild(td);
  return tr;
}

function toggleDetail(key) {
  openId = openId === key ? null : key;
  render();
}

function populateFileFilter() {
  const sel = document.getElementById("fileFilter");
  const files = [...new Set(DATA.map(r => r.file))].sort();
  for (const f of files) {
    const opt = document.createElement("option");
    opt.value = f;
    opt.textContent = f;
    sel.appendChild(opt);
  }
}

document.querySelectorAll("th[data-sort]").forEach(th => {
  th.addEventListener("click", () => {
    const key = th.dataset.sort;
    if (sortKey === key) sortAsc = !sortAsc;
    else { sortKey = key; sortAsc = true; }
    render();
  });
});

["search", "platformFilter", "fileFilter", "staleFilter"].forEach(id =>
  document.getElementById(id).addEventListener("input", render)
);
document.getElementById("voiceFilter").addEventListener("change", render);
document.getElementById("ariaFilter").addEventListener("change", render);

fetch("real_strings.json")
  .then(r => r.json())
  .then(data => {
    DATA = data;
    populateFileFilter();
    render();
  })
  .catch(err => {
    document.getElementById("rows").innerHTML =
      `<tr><td colspan="9">Failed to load real_strings.json: ${err}</td></tr>`;
  });
</script>

</body>
</html>
